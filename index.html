<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrippleNCJ Studio | Breakpoint</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --red: #e50914;
            --black: #0f0f0f;
            --card: #1b1b1b;
            --gray: #b3b3b3;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--black);
            color: white;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== NAVBAR ===== */
        nav {
            position: fixed;
            top: 0; width: 100%; height: 75px;
            padding: 0 5%;
            display: flex; align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            transition: var(--transition);
        }

        nav.scrolled { background: #000; height: 65px; border-bottom: 1px solid #222; }
        .logo img { height: 45px; }

        /* ===== HERO ===== */
        .hero {
            height: 100vh;
            display: flex; align-items: center;
            padding: 0 5%;
            position: relative;
            background: linear-gradient(to right, rgba(0,0,0,0.9) 20%, transparent 80%),
                        url('https://img.youtube.com/vi/uOlQF24CTXY/maxresdefault.jpg') center/cover;
        }

        .hero-content { max-width: 650px; z-index: 2; }
        .hero-tag { color: var(--red); font-weight: 600; letter-spacing: 2px; margin-bottom: 10px; }
        .hero h1 { font-size: clamp(3rem, 8vw, 5rem); line-height: 1.1; margin-bottom: 20px; }
        
        .btn-play {
            padding: 12px 30px; border-radius: 5px; font-size: 1.1rem;
            cursor: pointer; display: inline-flex; align-items: center; gap: 10px;
            font-weight: 600; border: none; background: white; color: black;
            transition: var(--transition);
        }
        .btn-play:hover { background: var(--red); color: white; transform: scale(1.05); }

        /* ===== EPISODES GRID ===== */
        .section { padding: 60px 5%; }
        .section-title { font-size: 1.8rem; margin-bottom: 30px; border-left: 4px solid var(--red); padding-left: 15px; }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .ep-card {
            background: var(--card);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
        }

        .ep-card:hover { transform: scale(1.03); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .ep-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .ep-info { padding: 15px; }
        .ep-info h3 { font-size: 1.1rem; margin-bottom: 5px; }
        .ep-meta { font-size: 0.85rem; color: var(--gray); display: flex; gap: 10px; }

        /* ===== PLAYER MODAL ===== */
        .player-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.97);
            z-index: 2000; display: none; align-items: center; justify-content: center;
            padding: 20px;
        }

        .player-box {
            width: 100%; max-width: 1000px; background: #141414;
            border-radius: 12px; overflow: hidden; position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .close-btn {
            position: absolute; right: 20px; top: 20px; z-index: 10;
            background: rgba(0,0,0,0.7); color: white; border: none;
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem;
        }

        .video-details { padding: 30px; }
        .video-meta-row { display: flex; align-items: center; gap: 15px; margin: 10px 0 20px; color: #aaa; font-size: 0.95rem; }
        .rate-badge { border: 1px solid #666; padding: 1px 6px; font-size: 0.8rem; border-radius: 3px; color: white; }
        .credits-box { margin-top: 20px; padding-top: 20px; border-top: 1px solid #222; font-size: 0.9rem; color: #888; }
        .credits-box span { color: #ddd; }

        /* ===== FOOTER ===== */
        footer { padding: 50px 5%; text-align: center; border-top: 1px solid #222; color: #555; }
        .social { margin-bottom: 15px; font-size: 1.5rem; display: flex; justify-content: center; gap: 20px; }
        .social a { color: #555; transition: 0.3s; }
        .social a:hover { color: var(--red); }

        @media (max-width: 768px) { .hero { background-position: 75% center; } }
    </style>
</head>
<body>

    <nav id="navbar">
        <a href="#" class="logo">
            <img src="https://i.ibb.co/VcLBbLB0/3364-removebg-preview-1.png" alt="Logo">
        </a>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <p class="hero-tag"><i class="fas fa-play-circle"></i> TRIPPLENCJ ORIGINAL</p>
            <h1>BREAKPOINT</h1>
            <p style="margin-bottom: 25px; color: #ccc; font-size: 1.1rem;">
                ซีรีส์สืบสวนลึกลับที่พาคุณดิ่งลึกสู่ปริศนาและการหักหลัง <br>ร่วมค้นหาความจริงที่ถูกซ่อนไว้ภายใต้คำลวง
            </p>
            <button class="btn-play" onclick="playVideo(0)">
                <i class="fas fa-play"></i> รับชมตอนล่าสุด
            </button>
        </div>
    </header>

    <main class="section">
        <h2 class="section-title">Breakpoint: ทุกตอน</h2>
        <div class="episode-grid" id="episodeList"></div>
    </main>

    <footer>
        <div class="social">
            <a href="https://youtube.com/@TrippleNCJ" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="mailto:tripplencj@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
        <p>© 2026 TRIPPLENCJ STUDIO. All Rights Reserved.</p>
    </footer>

    <!-- PLAYER MODAL -->
    <div class="player-overlay" id="playerOverlay">
        <div class="player-box">
            <button class="close-btn" onclick="closePlayer()">✕</button>
            <div id="videoFrame"></div>
            <div class="video-details">
                <h2 id="vTitle"></h2>
                <div class="video-meta-row">
                    <span id="vEp" style="color:var(--red); font-weight:600;"></span>
                    <span id="vDur"></span>
                    <span class="rate-badge" id="vRate"></span>
                </div>
                <p id="vDesc" style="color: #ddd;"></p>
                <div class="credits-box">
                    🎬 ทีมงานสร้างสรรค์: <span id="vCredits"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const episodes = [
            { 
                id: "uOlQF24CTXY", ep: "EP.1", title: "จุดเริ่มต้น", 
                dur: "2 นาที 49 วินาที", rate: "13+", 
                desc: "ซีรีส์สืบสวนลึกลับสุดเข้มข้นที่เต็มไปด้วยปริศนาและความจริงที่ไม่มีใครคาดคิด",
                credits: "Nikonpan, Nasa and Newtun"
            },
            { 
                id: "WrFwGxEqB3M", ep: "EP.2", title: "ความจริงเริ่มเผย", 
                dur: "2 นาที 48 วินาที", rate: "13+", 
                desc: "เมื่อทวีสันต์เริ่มเปิดโรงงาน และรับสมัครงาน ท่ามกลางสายตาที่จับจ้อง",
                credits: "Nikonpan, Nasa and Newtun"
            },
            { 
                id: "wXiwxUFf1aU", ep: "EP.3", title: "อดีตที่ถูกซ่อน", 
                dur: "3 นาที 22 วินาที", rate: "13+", 
                desc: "ทวีสันต์โดนภัทรนนท์หักหลัง ความเชื่อใจที่เคยมีเริ่มพังทลาย",
                credits: "Nikonpan, Nasa and Newtun"
            },
            { 
                id: "jd4Ia9OtpNs", ep: "EP.3.5", title: "ตอนพิเศษ", 
                dur: "2 นาที 30 วินาที", rate: "13+", 
                desc: "เบื้องหลังและมุมมองอีกด้านที่ความจริงอาจไม่ได้มีเพียงด้านเดียว",
                credits: "Nikonpan, Nasa and Newtun"
            },
            { 
                id: "ZUU6_Heef8s", ep: "EP.4", title: "จุดแตกหัก", 
                dur: "2 นาที 50 วินาที", rate: "13+", 
                desc: "ทุกคนเริ่มไม่ไว้ใจกัน บรรยากาศแห่งความหวาดระแวงเข้าปกคลุม",
                credits: "Nikonpan, Nasa and Newtun"
            }
        ];

        const container = document.getElementById('episodeList');
        episodes.forEach((item, index) => {
            container.innerHTML += `
                <div class="ep-card" onclick="playVideo(${index})">
                    <img src="https://img.youtube.com/vi/${item.id}/maxresdefault.jpg" alt="${item.ep}">
                    <div class="ep-info">
                        <h3>${item.ep}: ${item.title}</h3>
                        <div class="ep-meta">
                            <span><i class="far fa-clock"></i> ${item.dur}</span>
                            <span>${item.rate}</span>
                        </div>
                    </div>
                </div>
            `;
        });

        function playVideo(index) {
            const data = episodes[index];
            const overlay = document.getElementById('playerOverlay');
            document.getElementById('videoFrame').innerHTML = `
                <iframe width="100%" height="auto" style="aspect-ratio:16/9; border:none;" 
                src="https://www.youtube.com/embed/${data.id}?autoplay=1" 
                allow="autoplay; encrypted-media" allowfullscreen></iframe>
            `;
            document.getElementById('vTitle').innerText = `Breakpoint: ${data.title}`;
            document.getElementById('vEp').innerText = data.ep;
            document.getElementById('vDur').innerText = data.dur;
            document.getElementById('vRate').innerText = data.rate;
            document.getElementById('vDesc').innerText = data.desc;
            document.getElementById('vCredits').innerText = data.credits;
            
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('videoFrame').innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            window.scrollY > 50 ? nav.classList.add('scrolled') : nav.classList.remove('scrolled');
        });
    </script>
</body>
</html>
