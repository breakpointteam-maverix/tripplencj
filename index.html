<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrippleNCJ Studio | Breakpoint</title>

    <!-- Font & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --red: #e50914;
            --black: #0f0f0f;
            --card: #1b1b1b;
            --gray: #b3b3b3;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--black);
            color: white;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== NAVBAR ===== */
        nav {
            position: fixed;
            top: 0; width: 100%; height: 75px;
            padding: 0 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            transition: var(--transition);
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        nav.scrolled {
            background: #000;
            height: 65px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo img { height: 50px; }

        /* ===== HERO SECTION ===== */
        .hero {
            height: 100vh;
            display: flex; align-items: center;
            padding: 0 5%;
            position: relative;
            background: linear-gradient(to right, rgba(0,0,0,0.9) 30%, transparent 80%),
                        url('https://img.youtube.com/vi/uOlQF24CTXY/maxresdefault.jpg') center/cover;
        }

        .hero-content { max-width: 700px; z-index: 2; animation: fadeIn 1s ease; }
        .hero-tag { color: var(--red); font-weight: 600; letter-spacing: 3px; margin-bottom: 10px; }
        .hero h1 { font-size: clamp(3rem, 10vw, 5rem); line-height: 1; margin-bottom: 20px; }
        
        .btn-play {
            padding: 12px 30px; border-radius: 5px; font-size: 1.1rem;
            cursor: pointer; display: inline-flex; align-items: center; gap: 10px;
            font-weight: 600; border: none; background: white; color: black;
            transition: var(--transition); text-decoration: none;
        }
        .btn-play:hover { background: var(--red); color: white; transform: scale(1.05); }

        /* ===== EPISODES GRID ===== */
        .section { padding: 60px 5%; }
        .section-title { font-size: 1.8rem; margin-bottom: 30px; border-left: 5px solid var(--red); padding-left: 15px; }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .ep-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid #222;
        }

        .ep-card:hover { transform: translateY(-10px); border-color: var(--red); }
        .ep-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .ep-info { padding: 20px; }
        .ep-info h3 { margin-bottom: 8px; font-size: 1.2rem; }
        .ep-info p { color: var(--gray); font-size: 0.9rem; }

        /* ===== PLAYER MODAL ===== */
        .player-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 2000; display: none; align-items: center; justify-content: center;
            padding: 20px; backdrop-filter: blur(10px);
        }

        .player-box {
            width: 100%; max-width: 1000px; background: #111;
            border-radius: 15px; overflow: hidden; position: relative;
        }

        .close-btn {
            position: absolute; right: 15px; top: 15px; z-index: 10;
            background: rgba(0,0,0,0.6); color: white; border: none;
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
        }

        /* ===== FOOTER ===== */
        footer {
            padding: 60px 5%;
            background: #0a0a0a;
            text-align: center;
            border-top: 1px solid #222;
        }

        .social-links { margin: 20px 0; display: flex; justify-content: center; gap: 20px; }
        .social-links a { color: var(--gray); font-size: 1.5rem; transition: 0.3s; }
        .social-links a:hover { color: var(--red); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .hero { background-position: 70% center; }
            .section { padding: 40px 5%; }
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <a href="#" class="logo">
            <img src="https://i.ibb.co/VcLBbLB0/3364-removebg-preview-1.png" alt="TrippleNCJ Logo">
        </a>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <p class="hero-tag">TRIPPLENCJ ORIGINAL</p>
            <h1>BREAKPOINT</h1>
            <p style="font-size: 1.2rem; color: #ddd; margin-bottom: 30px; max-width: 500px;">
                ซีรีส์สืบสวนเข้มข้นที่ท้าทายทุกความเชื่อ เมื่อความจริงอาจเป็นเพียงจุดเริ่มต้นของจุดจบ
            </p>
            <button class="btn-play" onclick="playVideo('uOlQF24CTXY', 'Breakpoint EP.1', 'จุดเริ่มต้นของปริศนา')">
                <i class="fas fa-play"></i> เริ่มดูตอนแรก
            </button>
        </div>
    </header>

    <main class="section">
        <h2 class="section-title">ตอนทั้งหมด</h2>
        <div class="episode-grid" id="episodeList">
            <!-- ข้อมูลจะถูกดึงมาจาก JavaScript ด้านล่าง -->
        </div>
    </main>

    <footer>
        <div class="logo"><img src="https://i.ibb.co/VcLBbLB0/3364-removebg-preview-1.png" alt="Logo" style="height:40px"></div>
        <div class="social-links">
            <a href="https://youtube.com/@TrippleNCJ" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="mailto:tripplencj@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
        <p style="color: #444; font-size: 0.9rem;">
            © 2026 TRIPPLENCJ STUDIO — ALL RIGHTS RESERVED
        </p>
    </footer>

    <!-- VIDEO PLAYER -->
    <div class="player-overlay" id="playerOverlay">
        <div class="player-box">
            <button class="close-btn" onclick="closePlayer()">✕</button>
            <div id="videoContainer"></div>
            <div style="padding: 25px;">
                <h2 id="videoTitle"></h2>
                <p id="videoDesc" style="color: var(--gray); margin-top: 10px;"></p>
            </div>
        </div>
    </div>

    <script>
        // ข้อมูลวิดีโอ (แก้ไขตรงนี้เพื่อเพิ่มตอนใหม่)
        const episodes = [
            { id: "uOlQF24CTXY", ep: "EP.1", title: "จุดเริ่มต้น", desc: "ซีรีส์สืบสวนลึกลับสุดเข้มข้นที่เต็มไปด้วยปริศนา" },
            { id: "WrFwGxEqB3M", ep: "EP.2", title: "การรับสมัคร", desc: "เมื่อทวีสันต์เริ่มเปิดโรงงาน และรับสมัครงาน" },
            { id: "wXiwxUFf1aU", ep: "EP.3", title: "การหักหลัง", desc: "ทวีสันต์โดนภัทรนนท์หักหลัง" },
            { id: "jd4Ia9OtpNs", ep: "EP.3.5", title: "ตอนพิเศษ", desc: "ตอนพิเศษที่เผยอีกมุมหนึ่งของเรื่องราว" },
            { id: "ZUU6_Heef8s", ep: "EP.4", title: "จุดแตกหัก", desc: "ทุกคนเริ่มไม่ไว้ใจกัน ความลับเริ่มรั่วไหล" }
        ];

        // แสดงผลรายการวิดีโอ
        const episodeList = document.getElementById('episodeList');
        episodes.forEach(item => {
            episodeList.innerHTML += `
                <div class="ep-card" onclick="playVideo('${item.id}', 'Breakpoint ${item.ep}', '${item.desc}')">
                    <img src="https://img.youtube.com/vi/${item.id}/maxresdefault.jpg" alt="${item.ep}">
                    <div class="ep-info">
                        <h3>${item.ep}: ${item.title}</h3>
                        <p>${item.desc}</p>
                    </div>
                </div>
            `;
        });

        // ฟังก์ชันเล่นวิดีโอ
        function playVideo(id, title, desc) {
            const overlay = document.getElementById('playerOverlay');
            document.getElementById('videoContainer').innerHTML = `
                <iframe width="100%" height="auto" style="aspect-ratio:16/9; border:none;" 
                src="https://www.youtube.com/embed/${id}?autoplay=1" 
                allow="autoplay; encrypted-media" allowfullscreen></iframe>
            `;
            document.getElementById('videoTitle').innerText = title;
            document.getElementById('videoDesc').innerText = desc;
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('videoContainer').innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        // Navbar เปลี่ยนสีเมื่อเลื่อน
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            window.scrollY > 50 ? nav.classList.add('scrolled') : nav.classList.remove('scrolled');
        });
    </script>
</body>
</html>
